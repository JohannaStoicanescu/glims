name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      front: ${{ steps.filter.outputs.front }}
      back: ${{ steps.filter.outputs.back }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            front:
              - 'front/**'
            back:
              - 'back/**'

  lint_types_format_front:
    name: Lint, Typecheck & Format Front (npm)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.front == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install deps
        working-directory: front
        run: npm ci

      - name: Lint
        working-directory: front
        run: npm run lint

      - name: Typecheck
        working-directory: front
        run: npm run typecheck

      - name: Prettier check
        working-directory: front
        run: npm run prettier:check

  build_front:
    name: Build Front (npm)
    runs-on: ubuntu-latest
    needs: [changes, lint_types_format_front]
    if: needs.changes.outputs.front == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install deps
        working-directory: front
        run: npm ci

      - name: Build
        working-directory: front
        run: npm run build

  lint_types_format_back:
    name: Lint, Typecheck & Format Back (pnpm)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.back == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: back/pnpm-lock.yaml

      - name: Install deps
        working-directory: back
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        working-directory: back
        run: pnpm prisma generate

      - name: Lint
        working-directory: back
        run: pnpm run lint

      - name: Typecheck
        working-directory: back
        run: pnpm run typecheck

      - name: Format check
        working-directory: back
        run: pnpm run format:check

      - name: Tests
        working-directory: back
        run: pnpm test

      - name: Tests
        working-directory: back
        run: pnpm test

  test_build_back:
    name: Test & Build Back (pnpm)
    runs-on: ubuntu-latest
    needs: [changes, lint_types_format_back]
    if: needs.changes.outputs.back == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: back/pnpm-lock.yaml

      - name: Install deps
        working-directory: back
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma types
        working-directory: back
        run: pnpm prisma generate

      # TODO:Uncomment the following lines when tests will be implemented
      # - name: Run tests
      #   working-directory: back
      #   run: pnpm test

      - name: Build
        working-directory: back
        run: pnpm run build

  require_ci:
    name: CI Required Gate
    runs-on: ubuntu-latest
    needs:
      - changes
      - lint_types_format_front
      - build_front
      - lint_types_format_back
      - test_build_back
    if: always()
    steps:
      - name: Enforce success for changed targets
        run: |
          FRONT=${{ needs.changes.outputs.front }}
          BACK=${{ needs.changes.outputs.back }}
          FRONT_LINT=${{ needs.lint_types_format_front.result }}
          FRONT_BUILD=${{ needs.build_front.result }}
          BACK_LINT=${{ needs.lint_types_format_back.result }}
          BACK_TEST=${{ needs.test_build_back.result }}

          if [ "$FRONT" = "true" ]; then
            if [ "$FRONT_LINT" != "success" ] || [ "$FRONT_BUILD" != "success" ]; then
              echo "Front changed but front jobs not successful"; exit 1
            fi
          fi
          if [ "$BACK" = "true" ]; then
            if [ "$BACK_LINT" != "success" ] || [ "$BACK_TEST" != "success" ]; then
              echo "Back changed but back jobs not successful"; exit 1
            fi
          fi
          echo "Gate passed."
