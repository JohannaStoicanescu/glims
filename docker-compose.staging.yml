services:
  front:
    image: ghcr.io/${GITHUB_REPOSITORY}/front:staging
    environment:
      - PORT=${FRONTEND_PORT}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    restart: unless-stopped

  back:
    image: ghcr.io/${GITHUB_REPOSITORY}/back:staging
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST}
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER}
      # Garage configuration
      - GARAGE_ENDPOINT=${GARAGE_ENDPOINT}
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - GARAGE_BUCKET_NAME=${GARAGE_BUCKET_NAME}
      - GARAGE_REGION=${GARAGE_REGION}
      # R2 configuration
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:16
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - staging_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    profiles: ["manual"]

  migrate:
    # Base (builder) image includes pnpm + Prisma CLI.
    # Run manually by an administrator: docker compose --profile manual up migrate
    image: ghcr.io/${GITHUB_REPOSITORY}/back-migrate:staging
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pnpm prisma migrate deploy"
    profiles: ["manual"]

volumes:
  staging_db_data:
